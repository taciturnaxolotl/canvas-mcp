name: Deploy Canvas MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: canvas-mcp
      health_url: https://canvas.dunkirk.sh/health?detailed=true
      db_path: /var/lib/canvas-mcp/data/canvas-mcp.db
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
